app = "trusty-squire-mail"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  API_WEBHOOK_URL = "http://trusty-squire-api.internal:8080/v1/webhooks/postfix"

# Expose port 25 for inbound SMTP
[[services]]
  internal_port = 25
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 25

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
