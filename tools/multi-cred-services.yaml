# Multi-credential service queue for the housekeeper. Separate from
# tools/archived-harvester/services.yaml (which is the single-cred
# curated list) so we can iterate against multi-cred services without
# polluting the existing harvester's run history.
#
# Schema: same fields as the harvester queue.
#   slug              lowercase ID, used as the registry service slug.
#   name              display name; passed to provision_any_service.
#   signup_url        direct landing page the bot navigates to.
#   oauth_provider    google | github | null  (null = email form fill).
#   scope_hint        free-text guidance to the planner.
#   status            pending | skip | needs-manual.
#   notes             multi-line ops notes.

services:
  - slug: cloudinary
    name: Cloudinary
    signup_url: https://cloudinary.com/users/register_free
    oauth_provider: google
    scope_hint: null
    status: pending
    notes: |
      Image / video CDN. Three credentials visible on the dashboard
      immediately after signup: cloud_name, api_key, api_secret. No
      phone gate, no CC required, generous free tier (25 monthly
      credits). oauth_provider=google to bypass the email-form
      captcha (reCAPTCHA v2 image challenge); the Google button is
      visible in the form's header. Bundle sentinel: HTTP Basic
      against https://api.cloudinary.com/v1_1/<cloud_name>/usage
      with <api_key>:<api_secret>.

  - slug: algolia
    name: Algolia
    signup_url: https://www.algolia.com/users/sign_up
    oauth_provider: google
    scope_hint: null
    status: pending
    notes: |
      Search-as-a-service. Three credentials on the API Keys page:
      application_id, admin_api_key, search_api_key. Free tier with
      generous limits. Bundle sentinel: GET
      https://<application_id>.algolia.net/1/keys with the headers
      X-Algolia-API-Key: <admin_api_key> and X-Algolia-Application-Id:
      <application_id>.

  - slug: datadog
    name: DataDog
    signup_url: https://www.datadoghq.com/free-datadog-trial/
    oauth_provider: github
    scope_hint: null
    status: pending
    notes: |
      Observability platform. Two credentials in Organization
      Settings → API Keys + Application Keys: api_key + app_key.
      14-day free trial, NO credit card required to start. Signup
      asks for company size + role — multi-step form. Bundle
      sentinel: GET https://api.datadoghq.com/api/v1/validate with
      headers DD-API-KEY: <api_key> and DD-APPLICATION-KEY: <app_key>.

  - slug: plaid
    name: Plaid
    signup_url: https://dashboard.plaid.com/signup
    oauth_provider: github
    scope_hint: null
    status: pending
    notes: |
      Fintech API. Sandbox credentials immediately on dashboard:
      client_id + sandbox_secret. Signup asks for use-case (fintech
      app description). Bundle sentinel: POST
      https://sandbox.plaid.com/institutions/get with JSON body
      {client_id, secret, count: 1, country_codes: ['US']}.

  - slug: twilio
    name: Twilio
    signup_url: https://www.twilio.com/try-twilio
    oauth_provider: google
    scope_hint: null
    status: pending
    notes: |
      SMS / voice. Two credentials on console: account_sid +
      auth_token. Trial requires phone verification (real-world test
      of whether multi-cred path completes when this commonly-failing
      gate is reached). Bundle sentinel: GET
      https://api.twilio.com/2010-04-01/Accounts/<account_sid>.json
      with HTTP Basic <account_sid>:<auth_token>.
