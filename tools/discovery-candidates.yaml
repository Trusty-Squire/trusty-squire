# Discovery candidate queue — 300 services for the autonomous heal/discover
# sweep. Compiled 2026-06-10. SUPPLY-SIDE, predicted-demand ranked (no real
# user-demand data yet), criteria-filtered:
#   1. free-tier signup that yields an API key without payment
#   2. responsible to autosignup — NO payments sector, no heavy manual config
#      (KYC, business verification, sales-call gates)
# Deduped against the 44 services with an ACTIVE skill as of 2026-06-10, so
# every entry here is net-new coverage. The sweep additionally skip-actives at
# runtime, so a service that gets skilled drops out automatically.
#
# `status: needs-manual` = a known wall (phone/SMS gate, aggressive anti-bot,
# payments-adjacent) — excluded from the auto sweep so it doesn't burn the daily
# cap; surfaced for a human instead. Everything else defaults to a discover
# attempt; the bot's failure taxonomy catches the rest.
#
# signup_url + oauth_provider are best-effort from public knowledge; the bot's
# URL-guesser + curated url cover any drift. Point the heal sweep here with
# --from=tools/discovery-candidates.yaml.

