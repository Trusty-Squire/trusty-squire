# Skill-harvester queue.
#
# Each entry describes one service the harvester will attempt to sign up
# to + promote a replayable skill for. Fields:
#
#   slug              Stable lowercase ID. Used as the registry service
#                     slug AND as a GitHub label (`service:<slug>`).
#                     MUST be lowercase, no spaces. Editing breaks state
#                     tracking; pick once and freeze.
#   name              Display name. Passed to provision_any_service as
#                     the `service` argument and shown in GitHub issue
#                     titles. Mirrors the planner's "Service:" line.
#   signup_url        Direct URL the bot navigates to. The bot's
#                     URL-discovery flow is bypassed because the
#                     harvester picks deliberate landing pages — pick
#                     /signup, /register, or /login as appropriate. For
#                     Railway specifically: /login (not /new, which is
#                     authed-only).
#   oauth_provider    The OAuth identity to use. As of harvester v1 we
#                     only run signups via `google` (methoxine@gmail.com
#                     session in the harvester chrome profile). GitHub-
#                     only services are not yet in scope and should be
#                     marked status:skip until that lands.
#   scope_hint        Free-text guidance to the planner for permission/
#                     scope dropdowns (Sentry's per-row picker; Postmark's
#                     server-vs-account toggle). Empty / null lets the
#                     rc.12 default kick in ("max permissions").
#   status            Lifecycle state.
#                       pending      — never attempted, eligible to run
#                       skip         — known-incompatible, harvester
#                                       never picks this. Document reason.
#                       hold         — temporarily paused (e.g. waiting
#                                       for an upstream fix). Same effect
#                                       as skip but signals intent.
#                     The runtime per-attempt state (running, replay-ok,
#                     failed, needs-manual) lives on the GitHub issue's
#                     labels, NOT here — this file is hand-edited config,
#                     not a state DB.

- slug: ipinfo
  name: IPInfo
  signup_url: https://ipinfo.io/signup
  oauth_provider: google
  scope_hint: null
  status: pending
  notes: |
    Simplest known case — API key on dashboard after signup. Already
    promoted from a prior lunchboxfortwo run; this re-validates with
    methoxine identity.

- slug: openrouter
