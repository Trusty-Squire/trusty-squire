- slug: sentry
  name: Sentry
  signup_url: https://sentry.io/signup/
  oauth_provider: google
  scope_hint: max permissions on every scope dropdown — Admin > Write > Read
  notes: |
    rc.11 unblocks sentry: selectFromCombobox now (a) resolves
    `<label for="X">` selectors to `#X` before clicking so a label-
    pointer planner pick doesn't waste rounds and (b) falls back to
    a react-select keyboard idiom (Alt+Down + type-to-filter + Enter)
    when the existing role-based tiers find no visible options. Both
    paths verify the pick committed via aria-activedescendant / value
    / surrounding-text diff so a no-op click never returns success.
    Multi-row scope grid (Project / Team / Member / Issue / Event /
    Release / Organization). scope_hint steers each row to Admin/Write.
