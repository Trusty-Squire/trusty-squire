- slug: posthog
  name: PostHog
  signup_url: https://app.posthog.com/signup
  oauth_provider: google
  scope_hint: null
  status: needs-manual
  notes: |
    rc.5 update: already-signed-in dashboard detection now correctly
    fires (Hand off setup + project picker affordances unblock the
    detectAlreadySignedIn signal set). But PostHog separates its
    PUBLIC project token (window.JS_POSTHOG_API_KEY, embedded in
    page JS — the bot extracts this) from the PRIVATE Personal API
    Key (at us.posthog.com/me/settings/api-keys, behind 2 nav clicks
    and a key-name modal). The planner finds the JS token first and
    bails after the bot rejects its non-credential shape. Surfaces
    as no_credentials_after_already_signed_in. Needs a per-service
    navigation hint (Settings → User → API keys) or operator should
    fetch manually. Marking needs-manual until either ships.
    Previously: Slow SPA — the planner has historically raced the
    form render.
