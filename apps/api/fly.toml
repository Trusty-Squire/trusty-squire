app = "trusty-squire-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

# Sync the auth-DB schema to the api Prisma model on every deploy. We use
# `db push` (no migration files), and this used to be a manual step that
# got forgotten — a v2 column add shipped in code but never reached the
# DB, 500ing /v1/vault/credentials (see the 2026-05-29 vault-drift
# investigation). release_command runs in the release image with secrets
# available, so AUTH_DATABASE_URL resolves. Additive changes auto-apply;
# a destructive change makes `db push` exit non-zero and aborts the
# deploy rather than drifting silently. Uses the API's own prisma CLI
# (apps/api owns it since the inbox package was retired).
[deploy]
  release_command = "/app/apps/api/node_modules/.bin/prisma db push --schema=/app/apps/api/prisma/schema.prisma --skip-generate"

[env]
  API_PORT = "8080"
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  VOUCHFLOW_STUB_MODE = "true"
  VOUCHFLOW_CUSTOMER_ID = "ts-local-dev"
  SESSION_JWT_SECRET = "temp-secret-will-replace-with-real"

[http_service]
  internal_port = 8080
  force_https = true
  # This API receives asynchronous inbound webhooks (SES verification mail via
  # SNS -> /v1/webhooks/ses) that arrive seconds-to-minutes after a signup, when
  # the API is otherwise idle. It must never scale to zero: a stopped machine
  # 502s the inbound webhook during cold-start and drops the email. Keep one
  # machine always running. (See the 2026-05-17 inbox-outage investigation.)
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  
  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

# Private app-level funnel + health gauges. This port (9091) is deliberately
# NOT declared in [http_service], so it is NOT publicly routed — Fly's managed
# Prometheus ("Prometheus on Fly") scrapes it over the 6PN private network and
# feeds the org Grafana. Counts only, no PII / no secret material.
[[metrics]]
  port = 9091
  path = "/metrics"
