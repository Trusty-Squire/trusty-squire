app = "trusty-squire-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  API_PORT = "8080"
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  VOUCHFLOW_STUB_MODE = "true"
  VOUCHFLOW_CUSTOMER_ID = "ts-local-dev"
  SESSION_JWT_SECRET = "temp-secret-will-replace-with-real"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  
  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"
