<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Trusty Squire — sign in</title>
  <!--
    Trusty Squire branded noVNC client. Served by websockify from a
    temp dir that also holds the installed noVNC `core/` (see
    google-login.ts runHeadlessChrome). Deliberately uses ONLY noVNC's
    stable RFB API — the `RFB` default export, its constructor, the
    `scaleViewport`/`resizeSession` properties, the
    connect/disconnect/securityfailure events, and `rfb.sendKey()` —
    all stable across every noVNC 1.x release.
  -->
  <style>
    html, body { margin: 0; height: 100%; background: #0f1115; color: #e6e8ec;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    /* Flex column so the header takes whatever height it needs (a long
       sub-line on narrow phones wraps to a second row instead of being
       truncated by a hard-coded 39px), and #screen fills the rest. */
    body { display: flex; flex-direction: column; overflow: hidden; }
    #bar { flex: none; display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: #171a21; border-bottom: 1px solid #272b35;
      font-size: 13px; line-height: 1.35; flex-wrap: wrap; }
    #bar b { color: #fff; }
    #bar span.sub { color: #9aa0ab; }
    #dot { width: 8px; height: 8px; border-radius: 50%; background: #e0a23a;
      flex: none; }
    #dot.ok { background: #3fb950; }
    #dot.err { background: #f85149; }
    /* noVNC's scaleViewport is unreliable on mobile — its measurement
       races flex layout and we've burned three releases on it. Just
       do the scaling ourselves: width:100% + height:auto on the
       canvas, with the screen DIV flex-centering whatever's inside.
       The browser does aspect-preserving scaling from the canvas's
       intrinsic dimensions (the framebuffer width/height attributes)
       — exactly what we want, no JS involved. The !important is
       required because noVNC writes inline `style.width`/`style.height`
       on the canvas; without !important those would beat our rule. */
    #screen { flex: 1; position: relative; background: #0f1115;
              min-height: 0; min-width: 0; width: 100%;
              overflow: hidden;
              display: flex; align-items: center; justify-content: center; }
    #screen > canvas {
      display: block !important;
      width: 100% !important;
      height: auto !important;
      max-height: 100% !important;
    }
    /* Overlay siblings of #screen — `position: fixed` against the
       viewport, NOT positioned inside #screen. RFB appends a <canvas>
       child to #screen at connect time, and that canvas can cover any
       absolutely-positioned children even with z-index. Sibling +
       fixed keeps them above the canvas unconditionally. */
    #msg { position: fixed; top: 50%; left: 0; right: 0; text-align: center;
      transform: translateY(-50%); color: #9aa0ab; font-size: 14px; padding: 0 24px;
      pointer-events: none; z-index: 9; }
    /* The keyboard button. Always visible (no media-query gating —
       desktop users see a tiny ⌨ they ignore; better than a phone user
       finding nothing). Position fixed against the viewport so the OS
       gesture nav area at the bottom can't swallow taps meant for it. */
    #kb {
      position: fixed; right: 16px;
      bottom: max(96px, env(safe-area-inset-bottom, 16px));
      width: 64px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; border: none; background: #4f46e5; color: #fff;
      font-size: 28px; line-height: 1; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
      cursor: pointer; z-index: 20;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
      transition: background 120ms, transform 80ms;
    }
    #kb:active, #kb.tapped { transform: scale(0.92); background: #3fb950; }
    /* Hidden input the button focuses. The noVNC-canonical pattern:
       1×1 px, positioned off-screen, matching foreground+background so
       any flicker is invisible, z-index: -1 so it can't intercept any
       tap. iOS Safari refuses to pop the soft keyboard for an element
       it considers "invisible" — opacity:0 is one of those triggers —
       but a 1px element positioned off-screen counts as visible enough. */
    #kbInput {
      position: fixed; left: -40px; top: 0;
      width: 1px; height: 1px;
      background: #fff; color: #fff; caret-color: transparent;
      border: 0; padding: 0; margin: 0;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div id="bar">
    <span id="dot"></span>
    <b>Trusty Squire</b>
    <span class="sub">— sign in to your account, then return to your terminal.</span>
  </div>
  <div id="screen"></div>
  <!-- Overlays as body-level siblings, not children of #screen — see
       the #msg / #kb CSS comments above. -->
  <div id="msg">Connecting to the secure login window&hellip;</div>
  <!-- inputmode=text + autocorrect/autocapitalize/spellcheck off so the
       soft keyboard never offers autocomplete suggestions for a typed
       password, and never enriches characters before we forward them. -->
  <input id="kbInput" type="text" inputmode="text" autocomplete="off"
         autocorrect="off" autocapitalize="off" spellcheck="false"
         aria-hidden="true" tabindex="-1" />
  <button id="kb" type="button" aria-label="Show keyboard">⌨</button>
  <script type="module">
    import RFB from "./core/rfb.js";

    // The VNC password rides in the URL fragment (#p=...), never
    // the query string — a fragment is never sent to the server, so the
    // secret stays out of the cloudflared edge logs and any proxy.
    // Accept the legacy `password=` key too in case any old bookmark
    // outlived the rename.
    const params = new URLSearchParams(location.hash.replace(/^#/, ""));
    const password = params.get("p") || params.get("password") || "";
    const dot = document.getElementById("dot");
    const msg = document.getElementById("msg");
    const screen = document.getElementById("screen");
    const kbBtn = document.getElementById("kb");
    const kbInput = document.getElementById("kbInput");

    const wsUrl =
      (location.protocol === "https:" ? "wss://" : "ws://") +
      location.host +
      "/websockify";

    let rfb;
    try {
      rfb = new RFB(screen, wsUrl, { credentials: { password }, shared: true });
      // Disable BOTH server-side resize and noVNC's CSS scaling. The
      // canvas styling above does aspect-preserving fit-to-width in
      // pure CSS; touching either of these from JS introduces races
      // we can't win on first paint.
      rfb.scaleViewport = false;
      rfb.resizeSession = false;
    } catch (err) {
      dot.className = "err";
      msg.textContent = "Could not start the login window: " + err;
    }

    if (rfb) {
      rfb.addEventListener("connect", () => {
        dot.className = "ok";
        msg.style.display = "none";
      });
      rfb.addEventListener("disconnect", () => {
        dot.className = "err";
        msg.style.display = "";
        msg.textContent =
          "Login window closed. If you finished signing in, return to " +
          "your terminal — you can close this tab.";
      });
      rfb.addEventListener("securityfailure", () => {
        dot.className = "err";
        msg.style.display = "";
        msg.textContent = "Could not authenticate to the login window.";
      });

      // Tap → soft keyboard pop. The blur+focus dance is load-bearing:
      // focus() on an already-focused element is a no-op so the OS
      // won't re-trigger the keyboard; blur first forces a fresh focus
      // event. The whole sequence stays inside the click handler so
      // iOS Safari and Android Chrome both accept the focus() as
      // gesture-bound. Focusing a real <input> is what pops the OS
      // keyboard — focusing the RFB div (rfb.focus() in noVNC 1.x)
      // wouldn't.
      //
      // The .tapped class flashes the button green for 200ms so the
      // user can see the tap registered even if the OS doesn't (yet)
      // pop the keyboard — separates "did my tap reach the button?"
      // from "does focus() pop the keyboard on this device?"
      kbBtn.addEventListener("click", (e) => {
        e.preventDefault();
        kbBtn.classList.add("tapped");
        setTimeout(() => kbBtn.classList.remove("tapped"), 200);
        kbInput.blur();
        kbInput.value = "";
        kbInput.focus();
      });

      // X11 keysyms for the keys mobile keyboards send that don't
      // arrive as text in the `input` event. (Reference:
      // https://github.com/novnc/noVNC/blob/master/core/input/keysym.js
      // — these values are stable.)
      const SPECIAL_KEYS = {
        Backspace: 0xff08,
        Tab: 0xff09,
        Enter: 0xff0d,
        Escape: 0xff1b,
        ArrowLeft: 0xff51,
        ArrowUp: 0xff52,
        ArrowRight: 0xff53,
        ArrowDown: 0xff54,
        Delete: 0xffff,
      };

      // Forward typed characters. The `input` event fires once per
      // commit (each char on most soft keyboards; sometimes batched
      // when an IME finalizes). We send a press+release for each
      // character, then clear the input so it never accumulates the
      // user's password.
      let lastKbValue = "";
      kbInput.addEventListener("input", () => {
        const newValue = kbInput.value;
        if (newValue.length > 0) {
          for (const ch of newValue) {
            const keysym = ch.charCodeAt(0);
            rfb.sendKey(keysym, null, true);
            rfb.sendKey(keysym, null, false);
          }
        } else if (lastKbValue.length > 0 && newValue.length === 0) {
          // Soft keyboards sometimes fire `input` with an empty value
          // when the user taps Backspace and there was only one char.
          rfb.sendKey(SPECIAL_KEYS.Backspace, "Backspace", true);
          rfb.sendKey(SPECIAL_KEYS.Backspace, "Backspace", false);
        }
        kbInput.value = "";
        lastKbValue = "";
      });

      // Special keys come through as keydown events. preventDefault
      // so the input doesn't try to act on them locally (e.g. Enter
      // submitting a form that doesn't exist).
      kbInput.addEventListener("keydown", (e) => {
        const keysym = SPECIAL_KEYS[e.key];
        if (keysym !== undefined) {
          e.preventDefault();
          rfb.sendKey(keysym, e.code, true);
          rfb.sendKey(keysym, e.code, false);
        }
      });
    }
  </script>
</body>
</html>
