name: Planner eval

# Post-OAuth navigation planner regression gate
# (docs/DESIGN-planner-navigation-eval.md, A6).
#
# Fires only when the planner code/prompt, the eval harness, or the eval
# corpus changes — unrelated commits skip it entirely.
#
# Two jobs, by design (A6 "reversible rollout"):
#   1. harness  (BLOCKING) — the deterministic part: typecheck + the pure
#      eval-harness unit tests (capture/outcome join, build-corpus + R3
#      redaction, target labeling, scorer self-consistency). No LLM, so it's
#      a safe hard gate and guards the corpus-integrity + redaction invariants.
#   2. eval-gate (ADVISORY, Phase 1) — runs the live planner at temp 0 over the
#      committed corpus and reports `regress: X/X · target-tune · target-holdout`
#      to the job summary. Needs an LLM key; skipped (green) when none is set.
#      continue-on-error so it never blocks a merge yet. Phase 2 flips the
#      regress bucket to blocking once the corpus is trusted.

on:
  push:
    branches: [main, staging]
    paths: &paths
      - "apps/mcp/src/bot/agent.ts"
      - "apps/mcp/src/bot/eval-onboarding.ts"
      - "apps/mcp/src/bot/eval-corpus.ts"
      - "apps/mcp/src/bot/eval-gate.ts"
      - "apps/mcp/src/bot/build-corpus.ts"
      - "apps/mcp/src/bot/label-target.ts"
      - "apps/mcp/corpus/eval/**"
      - ".github/workflows/planner-eval.yml"
  pull_request:
    branches: [main, staging]
    paths: *paths

concurrency:
  group: planner-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Deterministic gate — no LLM. Safe to block on.
  # ---------------------------------------------------------------------------
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # agent.ts (imported by the harness) transitively reaches the inbox
      # client; generate its prisma client first, mirroring ci.yml.
      - name: Prisma generate (inbox)
        run: pnpm --filter '@trusty-squire/inbox' prisma:generate
      - name: Build workspace dep dists
        run: pnpm -r --filter "./packages/**" --if-present build
      - name: Typecheck mcp
        run: pnpm --filter '@trusty-squire/mcp' typecheck
      - name: Eval-harness unit tests (deterministic)
        run: |
          pnpm --filter '@trusty-squire/mcp' exec vitest run \
            src/bot/__tests__/onboarding-capture.test.ts \
            src/bot/__tests__/build-corpus.test.ts \
            src/bot/__tests__/label-target.test.ts \
            src/bot/__tests__/eval-onboarding.test.ts

  # ---------------------------------------------------------------------------
  # Live eval — temp 0 planner over the committed corpus. Advisory (Phase 1).
  # ---------------------------------------------------------------------------
  eval-gate:
    runs-on: ubuntu-latest
    continue-on-error: true # Phase 1: report, never block
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate (inbox)
        run: pnpm --filter '@trusty-squire/inbox' prisma:generate
      - name: Build workspace dep dists
        run: pnpm -r --filter "./packages/**" --if-present build
      - name: Run eval-gate (advisory)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          UNIVERSAL_BOT_LLM_TIER: cheap
        run: |
          set -uo pipefail
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "### Planner eval — skipped (no OPENROUTER_API_KEY secret set)" >> "$GITHUB_STEP_SUMMARY"
            echo "no LLM key in CI — set the OPENROUTER_API_KEY secret to enable the advisory eval."
            exit 0
          fi
          cd apps/mcp
          # eval-gate exits non-zero when the regress bucket isn't 100%; in
          # Phase 1 we capture the line and surface it without failing the job.
          set +e
          OUT=$(npx tsx src/bot/eval-gate.ts 2>&1)
          CODE=$?
          set -e
          echo "$OUT"
          {
            echo "### Planner eval (advisory)"
            echo ""
            echo '```'
            echo "$OUT" | grep -E '^(regress:|  )' || echo "$OUT" | tail -20
            echo '```'
            if [ "$CODE" -ne 0 ]; then
              echo ""
              echo "⚠️ regress bucket is **not** 100% — Phase 2 would block this merge."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
