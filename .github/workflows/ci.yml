name: CI

# Pragmatic CI: runs only what actually passes locally on `staging`.
#
# The previous workspace-wide `pnpm lint / typecheck / test` had been
# broken for weeks (31 lint errors, typecheck failures in api +
# registry). It blocked every release and trained agents to ignore
# CI red. This config scopes to packages with green status so:
#   - red = real new breakage, not historical noise
#   - releases can land
#
# Skipped (TODO: fix and re-enable):
#   - typecheck @trusty-squire/api          (prisma model name drift)
#   - typecheck @trusty-squire/registry (prisma + fastify plugin opts)
#   - test     @trusty-squire/registry  (4 failing — same prisma drift)
#   - lint                                  (31 errors, mostly apps/web
#                                           floating promises + unused vars)

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  # Block real captured credentials from entering the repo. On 2026-06-08 a
  # live Pusher key+secret got pasted into a test fixture and GitGuardian
  # flagged it within hours; this is the mechanical guard against a repeat.
  # Dependency-free (bash + grep) so it's a fast, always-green-or-real-red gate.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for credential-shaped values
        run: tools/secret-scan.sh

  # Block an un-evidenced "wall": a service marked needs-manual/unservable must
  # carry dated affordance-probe evidence (last_probed) OR be grandfathered.
  # A NEW unservable label without proof fails here — so a false wall (e.g.
  # "fly.io is github-only") can't merge on an unverified say-so. The control
  # lives in CI, not in anyone's memory. Dependency-free (node only).
  wall-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint wall/unservable labels for probe evidence
        run: node tools/lint-wall-evidence.mjs

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Workspace deps (skill-schema, inbox, runtime, etc.) ship as TS sources
      # whose package.json points at dist/. tsc can't resolve them otherwise.
      # Inbox needs prisma generate first or its build fails.
      - name: Prisma generate (inbox)
        run: pnpm --filter '@trusty-squire/inbox' prisma:generate
      - name: Build workspace dep dists
        run: pnpm -r --filter "./packages/**" --if-present build
      # Per-package typecheck on the green set. Workspace-wide pnpm -r
      # typecheck includes apps/api + apps/registry which have
      # pre-existing type errors tracked separately.
      - name: Typecheck (green packages)
        run: |
          set -euo pipefail
          PKGS=(
            "@trusty-squire/mcp"
            "@trusty-squire/inbox-api"
            "@trusty-squire/web"
            "@trusty-squire/pwa"
            "@trusty-squire/skill-schema"
            "@trusty-squire/adapter-resend"
            "@trusty-squire/runtime"
            "@trusty-squire/inbox"
            "@trusty-squire/mandate-validator"
          )
          for p in "${PKGS[@]}"; do
            echo "::group::$p"
            pnpm --filter "$p" typecheck
            echo "::endgroup::"
          done

  # Production build (the emit path). typecheck runs `tsc --noEmit` and test
  # runs vitest — NEITHER exercises `tsc -p tsconfig.build.json`. So a
  # build-order / published-dep-skew break (e.g. apps/mcp importing a
  # skill-schema export whose dist hasn't been built / has gone stale) passes
  # both and only surfaces at local build or release time. This job makes that
  # break a PR red. Dep order matters: skill-schema's dist must exist before
  # mcp's production build — the workspace-dep-dist step below builds it first.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate (inbox)
        run: pnpm --filter '@trusty-squire/inbox' prisma:generate
      # Builds skill-schema (+ other workspace packages) dist FIRST.
      - name: Build workspace dep dists
        run: pnpm -r --filter "./packages/**" --if-present build
      # The mcp production build (tsc -p tsconfig.build.json) over the freshly
      # built skill-schema dist — the exact path that broke at 0.9.14 release.
      - name: Build mcp (production)
        run: pnpm -F @trusty-squire/mcp build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # apps/api + apps/inbox-api tests import @trusty-squire/runtime and
      # @trusty-squire/adapter-resend, whose package.json points at dist/.
      # Prisma-backed packages need their client generated before tests.
      # NOT vault: its prisma client is consumed by apps/api (which has its
      # own isolated client), the vault package's own src/tests don't import
      # it, and vault's schema has no custom `output` — so generating it here
      # would clobber inbox's default-location client and break inbox's build.
      - name: Prisma generate (inbox, registry)
        run: |
          pnpm --filter '@trusty-squire/inbox' prisma:generate
          pnpm --filter '@trusty-squire/registry' prisma:generate
      - name: Build workspace dep dists
        run: pnpm -r --filter "./packages/**" --if-present build
      # Per-package test over every package whose suite passes locally.
      # (registry + vault were historically excluded; the registry "prisma
      # drift" failures are resolved — both are green and now run here.)
      - name: Test (green packages)
        run: |
          set -euo pipefail
          PKGS=(
            "@trusty-squire/mcp"
            "@trusty-squire/api"
            "@trusty-squire/inbox-api"
            "@trusty-squire/pwa"
            "@trusty-squire/skill-schema"
            "@trusty-squire/adapter-resend"
            "@trusty-squire/runtime"
            "@trusty-squire/inbox"
            "@trusty-squire/mandate-validator"
            "@trusty-squire/registry"
            "@trusty-squire/vault"
          )
          for p in "${PKGS[@]}"; do
            echo "::group::$p"
            pnpm --filter "$p" test
            echo "::endgroup::"
          done
