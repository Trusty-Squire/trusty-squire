name: Release mcp

# Publishes @trusty-squire/mcp to npm and creates a GitHub release whenever the
# version in apps/mcp/package.json is bumped on `main` (stable) or `staging` (rc).
#
# Source of truth: apps/mcp/package.json `version` field.
#   - main:    must be a stable semver (e.g. 0.6.13). Publishes `latest` tag.
#   - staging: must be a prerelease (e.g. 0.6.14-rc.1). Publishes `next` tag.
#
# If a git tag v<version> already exists, the job is a no-op (idempotent).
# This means re-pushing main without bumping the version does NOT republish.
#
# Path filter: only fires on changes that could affect the mcp tarball
# (apps/mcp, packages/inbox, packages/skill-schema, root lockfile, this file).
# Unrelated commits to other parts of the monorepo skip CI entirely.

on:
  push:
    branches: [main, staging]
    paths:
      - "apps/mcp/**"
      - "packages/inbox/**"
      - "packages/skill-schema/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/release.yml"

# Only one release run per branch at a time. Don't cancel in-flight: a publish
# that's mid-way through registering on npm should be allowed to finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create tags + releases
  id-token: write   # npm provenance (sigstore)

jobs:
  # ---------------------------------------------------------------------------
  # Gate: re-run lint + typecheck + test inside the same job graph as publish.
  # We don't trust an out-of-band ci.yml result — explicit gate, explicit failure.
  # ---------------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest
    outputs:
      version:        ${{ steps.read.outputs.version }}
      is_prerelease:  ${{ steps.read.outputs.is_prerelease }}
      tag_exists:     ${{ steps.read.outputs.tag_exists }}
      npm_dist_tag:   ${{ steps.read.outputs.npm_dist_tag }}
      gh_prerelease:  ${{ steps.read.outputs.gh_prerelease }}
      should_publish: ${{ steps.read.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to see existing tags

      # The monorepo contains a Next.js app (apps/web) whose
      # node_modules and .next caches blow past the default runner disk
      # quota (14GB free of 75GB). pnpm install + tests fail with ENOSPC.
      # Free ~25GB by removing preinstalled toolchains we don't use.
      - name: Free disk space on runner
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/PyPy /usr/local/share/boost /usr/local/share/powershell || true
          sudo docker system prune -af --volumes || true
          echo "Disk after cleanup:"
          df -h /

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0   # match packageManager in root package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Install ONLY mcp's dep tree, not the entire monorepo (which has
      # Next.js apps whose ~4M symlinks exhaust the runner's inode quota).
      - name: Install (mcp dep tree only)
        run: pnpm install --frozen-lockfile --filter '@trusty-squire/mcp...'

      # Workspace deps (e.g. @trusty-squire/skill-schema) ship as TypeScript
      # sources with `main: ./dist/index.js`. Vitest's vite resolver follows
      # that pointer, so without a prior workspace build the MCP tests fail
      # with "Failed to resolve entry for package @trusty-squire/skill-schema".
      # We exclude the MCP package itself — its own dist gets built fresh
      # in the publish job right before npm publish.
      - name: Build mcp's workspace deps (for test resolution)
        # Vitest follows the `main` of @trusty-squire/{skill-schema,inbox} to
        # their dist/ — those must exist before mcp tests can import them.
        # `inbox` requires `prisma generate` first; without the generated client
        # tsc fails with "Property 'emailAlias' does not exist on type 'PrismaClient'".
        # Explicitly list mcp's workspace deps (keep in sync with apps/mcp/package.json).
        run: |
          pnpm --filter '@trusty-squire/inbox' prisma:generate
          pnpm --filter '@trusty-squire/skill-schema' --filter '@trusty-squire/inbox' build

      # NOTE: lint + typecheck are intentionally NOT gating this pipeline yet.
      # The repo has pre-existing lint/typecheck debt (see ci.yml signal).
      # Tests are the real safety net — once cleanup lands, re-enable the
      # `pnpm lint` and `pnpm typecheck` steps above the test step.
      #
      # Scope: only the MCP package tests gate publishing. The registry
      # has pre-existing replay-skill test flakiness that doesn't affect the
      # MCP we're publishing here. Workspace-wide tests still run in ci.yml
      # for signal — they just don't block publishes.
      - name: Test (MCP package only)
        # Skip the pnpm-pack smoke test — it exhausts inodes on GH runners,
        # and the publish job's own tarball-content verification covers the
        # same ground from real registry bytes.
        env:
          MCP_SKIP_PACK_SMOKE: "1"
        run: pnpm --filter @trusty-squire/mcp test

      # Preflight: refuse to publish mcp if its runtime workspace dep
      # (@trusty-squire/skill-schema) isn't on the npm registry at a version
      # the published mcp tarball will resolve to. Without this, mcp can
      # ship "successfully" but `npm install` fails for end users with
      # ETARGET. Skip the check if mcp's skill-schema dep is still a
      # `workspace:` spec — that means we're in a state where mcp isn't
      # being bumped right now (path filter probably tripped accidentally).
      - name: Preflight — skill-schema dep resolvable on npm
        run: |
          set -euo pipefail
          DEP_SPEC=$(node -p "require('./apps/mcp/package.json').dependencies['@trusty-squire/skill-schema'] || ''")
          echo "mcp depends on skill-schema: $DEP_SPEC"
          if [[ -z "$DEP_SPEC" ]]; then
            echo "mcp no longer depends on skill-schema — skipping preflight."
            exit 0
          fi
          if [[ "$DEP_SPEC" == workspace:* ]]; then
            # pnpm will rewrite workspace:^ → ^<local-version> at publish.
            LOCAL_V=$(node -p "require('./packages/skill-schema/package.json').version")
            echo "workspace spec — will be rewritten to ^$LOCAL_V at publish."
            DEP_SPEC="^$LOCAL_V"
          fi
          echo "Checking npm has a version satisfying: $DEP_SPEC"
          # If skill-schema's release workflow is running in parallel (same push
          # bumped both versions), poll for up to 5min so we don't race-fail.
          MATCH=""
          for i in $(seq 1 30); do
            MATCH=$(npm view "@trusty-squire/skill-schema@$DEP_SPEC" version 2>/dev/null | tail -1 || true)
            if [[ -n "$MATCH" ]]; then break; fi
            echo "  attempt $i — no match yet for $DEP_SPEC, sleeping 10s"
            sleep 10
          done
          if [[ -z "$MATCH" ]]; then
            echo "::error::No published @trusty-squire/skill-schema satisfies '$DEP_SPEC' after 5min. Publish skill-schema first."
            exit 1
          fi
          echo "✓ skill-schema $MATCH satisfies $DEP_SPEC on the registry."

      - name: Read package version + decide
        id: read
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./apps/mcp/package.json').version")
          BRANCH="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Branch:  $BRANCH"
          echo "Version: $VERSION"

          # Detect prerelease per semver: anything after a `-`
          if [[ "$VERSION" == *"-"* ]]; then
            IS_PRE=true
          else
            IS_PRE=false
          fi
          echo "is_prerelease=$IS_PRE" >> "$GITHUB_OUTPUT"

          # Branch ↔ version-shape contract
          if [[ "$BRANCH" == "main" && "$IS_PRE" == "true" ]]; then
            echo "::error::main branch requires a stable version, got prerelease: $VERSION"
            exit 1
          fi
          if [[ "$BRANCH" == "staging" && "$IS_PRE" == "false" ]]; then
            echo "::error::staging branch requires a prerelease version (e.g. $VERSION-rc.1), got stable: $VERSION"
            exit 1
          fi

          # Tag-existence check = idempotent skip
          if git rev-parse --quiet --verify "refs/tags/v$VERSION" >/dev/null; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"

          # npm dist-tag + GH release flag
          if [[ "$IS_PRE" == "true" ]]; then
            echo "npm_dist_tag=next"  >> "$GITHUB_OUTPUT"
            echo "gh_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "gh_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          # Also short-circuit if npm already has this exact version published.
          # Don't fail — just skip. Lets us re-run main with no version bump.
          if npm view "@trusty-squire/mcp@$VERSION" version >/dev/null 2>&1; then
            NPM_HAS=true
          else
            NPM_HAS=false
          fi
          echo "npm_has=$NPM_HAS"

          if [[ "$TAG_EXISTS" == "true" || "$NPM_HAS" == "true" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping publish: version $VERSION already released (tag_exists=$TAG_EXISTS, npm_has=$NPM_HAS)"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Publish: npm + GitHub release. Only runs if verify said should_publish=true.
  # ---------------------------------------------------------------------------
  publish:
    needs: verify
    if: needs.verify.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    # NPM_TOKEN lives in the `npm-publish` GitHub Environment (not repo
    # secrets), so we need this `environment:` block to access it. The
    # environment's required-reviewers protection rule has been removed
    # (it was silently blocking rc.4/rc.5). If you re-add reviewers, make
    # sure they're actually monitored — a stuck-pending publish job is
    # not visibly different from a successful one until you look.
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space on runner
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/PyPy /usr/local/share/boost /usr/local/share/powershell || true
          sudo docker system prune -af --volumes || true

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Install ONLY mcp's dep tree (mcp + transitive workspace deps), not
      # the entire monorepo. A full `pnpm install` creates ~4M symlinks
      # across apps/web + its Next.js node_modules, which
      # exceeds the GH runner's inode quota and crashes with ENOSPC mid-
      # install (NOT disk space — `df -h` shows 100GB free; it's inodes,
      # which `df -i` would show exhausted).
      - name: Install (mcp dep tree only)
        run: pnpm install --frozen-lockfile --filter '@trusty-squire/mcp...'

      - name: Generate Prisma client for inbox
        # `packages/inbox` (an mcp workspace dep) ships a Prisma schema; tsc
        # fails ("Property 'emailAlias' does not exist on PrismaClient")
        # without a generated client.
        run: pnpm --filter '@trusty-squire/inbox' prisma:generate

      - name: Build mcp's workspace deps
        # Build ONLY what mcp depends on. A full `pnpm -r build` pulls in
        # apps/web (Next.js) which rebuilds @prisma/client in
        # parallel and race with inbox's tsc, breaking the inbox build.
        # Keep in sync with apps/mcp/package.json workspace deps.
        run: pnpm --filter '@trusty-squire/skill-schema' --filter '@trusty-squire/inbox' build

      # Force a clean rebuild of the MCP package right before publish.
      # Without this, TypeScript's incremental build can reuse stale dist
      # from the workspace build above, and the prepublishOnly hook's
      # `npm run build` will be a no-op. The 0.6.14 release shipped with
      # an outdated dist/install/cli.js for exactly this reason.
      - name: Clean + rebuild MCP package (publish prerequisite)
        working-directory: apps/mcp
        run: |
          rm -rf dist tsconfig.build.tsbuildinfo
          npm run build
          # Spot-check that the build actually ran by looking for a sentinel
          # string the source has now and the previous published tarball
          # didn't. Fails loud if dist is somehow still stale.
          if ! grep -q 'case "connect"' dist/install/cli.js; then
            echo "::error::Built dist/install/cli.js is missing rename — refusing to publish stale tarball"
            exit 1
          fi

      # ---- npm publish -----------------------------------------------------
      # Use `pnpm publish`, NOT `npm publish`. pnpm rewrites `workspace:`
      # specifiers (e.g. `"@trusty-squire/skill-schema": "workspace:^"`) to
      # real semver (`^0.1.0`) before tarball assembly. `npm publish`
      # ships them through literally, producing an unusable package.
      # `--no-git-checks` because the working tree may differ from the
      # commit SHA (we just rebuilt dist/).
      - name: Publish to npm
        working-directory: apps/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          echo "Publishing @trusty-squire/mcp@${{ needs.verify.outputs.version }} with dist-tag ${{ needs.verify.outputs.npm_dist_tag }}"
          pnpm publish \
            --access=public \
            --tag="${{ needs.verify.outputs.npm_dist_tag }}" \
            --provenance \
            --no-git-checks

      # ---- Ground-truth verification: NEVER trust npm's success output -----
      # The previous agent burned three version numbers because they trusted
      # `+ @trusty-squire/mcp@X.Y.Z` from npm's stdout. We check THREE things
      # the registry actually serves:
      #   1. The tarball URL returns 200.
      #   2. The tarball's dist/install/cli.js contains the rename sentinel.
      #   3. The dist-tag we asked for actually points at our version.
      # Item 3 caught a real bug: pnpm publish in workspace mode silently
      # ignored --tag=latest and tagged 0.6.13 as `next` instead, leaving
      # `latest` stuck on 0.6.12. The tarball-only check missed it.
      - name: Verify version is live on registry
        run: |
          set -euo pipefail
          V="${{ needs.verify.outputs.version }}"
          # Use `npm view` not HEAD-on-tgz: npm's metadata index updates
          # ~10s after publish, but the tarball CDN (Fastly /-/foo.tgz) can
          # lag 5-10min behind in some regions. `npm view <pkg>@<ver>` is
          # what real users hit when they install, and what actually matters.
          # Poll up to 5min for metadata propagation.
          echo "Polling: npm view @trusty-squire/mcp@$V version (up to 5min) ..."
          for i in $(seq 1 30); do
            FOUND=$(npm view "@trusty-squire/mcp@$V" version 2>/dev/null || echo "")
            echo "  attempt $i → '$FOUND'"
            if [[ "$FOUND" == "$V" ]]; then
              echo "✓ Version $V is live on registry."
              break
            fi
            if [[ "$i" == "30" ]]; then
              echo "::error::Version $V not on registry after 5min. npm publish lied."
              exit 1
            fi
            sleep 10
          done

      # ---- Publish to the official MCP registry (github.com/mcp) -----------
      # github.com/mcp mirrors registry.modelcontextprotocol.io. We keep
      # io.github.Trusty-Squire/mcp current there by republishing on every npm
      # release, so the catalog never drifts (it was stuck at 0.7.1 while npm
      # was 0.8.x). Auth is GitHub Actions OIDC (the `id-token: write`
      # permission above) — the registry verifies the token's repo owner
      # (Trusty-Squire) against the io.github.Trusty-Squire namespace, so no
      # stored secret. server.json is synced to the just-published npm version
      # first (the registry rejects a server.json npm version npm doesn't
      # serve — hence this runs only after the live-on-registry check passes).
      # Non-fatal: a registry hiccup must not fail an otherwise-good npm release.
      - name: Publish to MCP registry (github.com/mcp)
        continue-on-error: true
        run: |
          set -uo pipefail
          V="${{ needs.verify.outputs.version }}"
          cd apps/mcp
          node -e '
            const fs=require("fs"); const v=process.argv[1];
            const s=JSON.parse(fs.readFileSync("server.json","utf8"));
            s.version=v;
            for (const p of (s.packages||[])) if (p.identifier==="@trusty-squire/mcp") p.version=v;
            fs.writeFileSync("server.json", JSON.stringify(s,null,2)+"\n");
          ' "$V"
          echo "server.json synced to $V; downloading mcp-publisher ..."
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
          echo "✓ Published $V to the MCP registry."

      - name: Verify tarball contents (case "connect" sentinel)
        run: |
          set -euo pipefail
          V="${{ needs.verify.outputs.version }}"
          URL="https://registry.npmjs.org/@trusty-squire/mcp/-/mcp-$V.tgz"
          # Tarball CDN (Fastly /-/foo.tgz) lags the metadata index — wait
          # for the binary to become downloadable before grepping it.
          echo "Waiting for tarball CDN (up to 5min) ..."
          for i in $(seq 1 30); do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" -I "$URL")
            if [[ "$CODE" == "200" ]]; then
              echo "✓ Tarball CDN ready (attempt $i)"
              break
            fi
            if [[ "$i" == "30" ]]; then
              echo "::warning::Tarball CDN still 404 after 5min — skipping content check."
              echo "  (npm metadata says version is live, so end users will install OK"
              echo "   once the CDN catches up. Content check is non-blocking.)"
              exit 0
            fi
            sleep 10
          done
          # Stage the tarball + extracted cli.js to disk before grep.
          # Under `set -o pipefail`, the earlier
          #   curl | tar -xzO ... | grep -q 'case "connect"'
          # form false-negative'd whenever the sentinel was actually
          # present: grep -q exits as soon as it matches, the
          # downstream pipe closes, tar's next write gets SIGPIPE
          # (exit 141), and pipefail surfaces 141 as the pipeline
          # status — making every successful publish look red.
          # Staging breaks the pipeline so each command's exit is
          # checked in isolation.
          TGZ="$(mktemp --suffix=.tgz)"
          CLI="$(mktemp --suffix=.cli.js)"
          trap 'rm -f "$TGZ" "$CLI"' EXIT
          curl -sSL "$URL" -o "$TGZ"
          tar -xzO -f "$TGZ" package/dist/install/cli.js > "$CLI"
          if ! grep -q 'case "connect"' "$CLI"; then
            echo "::error::Published tarball missing case \"connect\""
            exit 1
          fi
          echo "✓ Tarball contains case \"connect\""

      - name: Verify dist-tag points at this version (and fix if pnpm lied)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          V="${{ needs.verify.outputs.version }}"
          TAG="${{ needs.verify.outputs.npm_dist_tag }}"
          echo "Asserting dist-tag '$TAG' → $V"
          # pnpm publish has a known quirk in workspace mode where --tag is
          # silently ignored. Read the registry's dist-tags blob and fix it
          # explicitly if it's wrong. Idempotent.
          for i in $(seq 1 18); do
            CURRENT=$(npm view "@trusty-squire/mcp" dist-tags --json 2>/dev/null \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('$TAG',''))")
            echo "  attempt $i — npm view says $TAG = '$CURRENT'"
            if [[ "$CURRENT" == "$V" ]]; then
              echo "✓ dist-tag $TAG correctly points at $V."
              # Cross-check: the full package doc must agree. If it disagrees with
              # npm view, something is wrong at the registry level (do not declare
              # success — fail loud, surface the inconsistency).
              DOC_TAG=$(curl -sS "https://registry.npmjs.org/@trusty-squire/mcp" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('dist-tags',{}).get('$TAG',''))")
              if [[ "$DOC_TAG" != "$V" ]]; then
                echo "::error::Registry inconsistency: npm view says $TAG=$CURRENT but package doc says $TAG=$DOC_TAG"
                exit 1
              fi
              echo "✓ Cross-check: package doc also confirms $TAG=$V"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::dist-tag $TAG = '$CURRENT', expected '$V'. Forcing it via npm dist-tag add."
          npm dist-tag add "@trusty-squire/mcp@$V" "$TAG"
          # Re-verify after the fix.
          for i in $(seq 1 12); do
            CURRENT=$(npm view "@trusty-squire/mcp" dist-tags --json 2>/dev/null \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('$TAG',''))")
            echo "  post-fix attempt $i — $TAG = '$CURRENT'"
            if [[ "$CURRENT" == "$V" ]]; then
              echo "✓ dist-tag $TAG now points at $V (after explicit fix)."
              # Cross-check: the full package doc must agree. If it disagrees with
              # npm view, something is wrong at the registry level (do not declare
              # success — fail loud, surface the inconsistency).
              DOC_TAG=$(curl -sS "https://registry.npmjs.org/@trusty-squire/mcp" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('dist-tags',{}).get('$TAG',''))")
              if [[ "$DOC_TAG" != "$V" ]]; then
                echo "::error::Registry inconsistency: npm view says $TAG=$CURRENT but package doc says $TAG=$DOC_TAG"
                exit 1
              fi
              echo "✓ Cross-check: package doc also confirms $TAG=$V"
              exit 0
            fi
            sleep 5
          done
          echo "::error::dist-tag $TAG still wrong after fix attempt. Manual intervention required."
          exit 1

      # ---- GitHub release --------------------------------------------------
      - name: Build release tarball for GitHub
        working-directory: apps/mcp
        run: |
          npm pack
          ls -la *.tgz

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          V="${{ needs.verify.outputs.version }}"
          TAG="v$V"
          PRERELEASE_FLAG=""
          if [[ "${{ needs.verify.outputs.gh_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Auto-generate notes from the commits since the previous tag.
          # --generate-notes pulls PR titles and contributor list.
          gh release create "$TAG" \
            apps/mcp/trusty-squire-mcp-"$V".tgz \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE_FLAG \
            --target "$GITHUB_SHA"

      - name: Summary
        run: |
          {
            echo "## Released @trusty-squire/mcp@${{ needs.verify.outputs.version }}"
            echo ""
            echo "- npm dist-tag: \`${{ needs.verify.outputs.npm_dist_tag }}\`"
            echo "- GitHub release: [v${{ needs.verify.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.verify.outputs.version }})"
            echo "- Tarball: https://registry.npmjs.org/@trusty-squire/mcp/-/mcp-${{ needs.verify.outputs.version }}.tgz"
            echo ""
            echo "Install:"
            echo '```'
            echo "npm install -g @trusty-squire/mcp@${{ needs.verify.outputs.npm_dist_tag }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
